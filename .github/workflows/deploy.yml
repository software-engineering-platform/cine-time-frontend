name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux, k3s]
    env:
      KUBECONFIG: /home/samet/.kube/config

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sametyaprak/cine-time-frontend:latest .

      - name: Push to Docker Hub
        run: docker push sametyaprak/cine-time-frontend:latest

      - name: Deploy to k3s
        run: |
          kubectl rollout restart deployment/frontend -n cine-time
          kubectl rollout status deployment/frontend -n cine-time --timeout=300s
